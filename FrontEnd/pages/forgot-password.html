<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineJunction | Forgot Password</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="auth-page">
  <main class="auth-shell" role="main">
    <section class="auth-hero" aria-labelledby="forgot-hero-title">
      <div class="auth-hero__content">
        <a class="brand" href="../index.html" aria-label="Return to CineJunction home">
          <span class="logo">CineJunction</span>
        </a>
        <p class="eyebrow">Recovery</p>
        <h1 class="hero-title" id="forgot-hero-title">Reset the key to your account.</h1>
        <p class="body-text">We’ll send a secure link to the email associated with your CineJunction profile.</p>
      </div>
    </section>

    <section class="auth-card" aria-labelledby="forgot-title">
      <div class="auth-card__inner">
        <a class="brand brand--compact" href="../index.html" aria-label="Return to CineJunction home">
          <span class="logo">CineJunction</span>
        </a>
        <p class="eyebrow">Forgot password</p>
        <h2 class="section-title" id="forgot-title">Recover access</h2>
        <p class="body-text">Enter the email used for your CineJunction account and we’ll help you restore it.</p>

        <form class="auth-form" novalidate data-auth-form="forgot">
          <div class="field-group">
            <label class="input-label" for="forgot-email">Email</label>
            <div class="input-shell">
              <span class="input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" aria-hidden="true"><path d="M4 6h16v12H4z" fill="none" stroke="currentColor" stroke-width="1.7" /><path d="m4 7 8 7 8-7" fill="none" stroke="currentColor" stroke-width="1.7" /></svg>
              </span>
              <input id="forgot-email" name="email" type="email" placeholder="name@example.com" required />
            </div>
          </div>

          <p class="form-message" aria-live="polite"></p>

          <button class="btn btn-primary auth-submit" type="submit">Send reset link</button>
        </form>

        <p class="auth-footer"><a class="inline-link" href="login.html">Back to login</a></p>
      </div>
    </section>
  </main>

  <script src="../js/auth.js" defer></script>
  <script src="../js/navbar.js" defer></script>
</body>
</html>
