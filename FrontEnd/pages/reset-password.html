<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineJunction | Reset Password</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="auth-page">
  <main class="auth-shell" role="main">
    <section class="auth-hero" aria-labelledby="reset-hero-title">
      <div class="auth-hero__content">
        <a class="brand" href="../index.html" aria-label="Return to CineJunction home">
          <span class="logo">CineJunction</span>
        </a>
        <p class="eyebrow">Security</p>
        <h1 class="hero-title" id="reset-hero-title">Create a new door to your account.</h1>
        <p class="body-text">Choose a secure password that remains calm, memorable, and protected.</p>
      </div>
    </section>

    <section class="auth-card" aria-labelledby="reset-title">
      <div class="auth-card__inner">
        <a class="brand brand--compact" href="../index.html" aria-label="Return to CineJunction home">
          <span class="logo">CineJunction</span>
        </a>
        <p class="eyebrow">Reset password</p>
        <h2 class="section-title" id="reset-title">Choose a new password</h2>
        <p class="body-text">Secure your profile with a password that meets our recommendation.</p>

        <form class="auth-form" novalidate data-auth-form="reset">
          <div class="field-group">
            <label class="input-label" for="reset-password">New password</label>
            <div class="input-shell">
              <span class="input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" aria-hidden="true"><rect x="4" y="9" width="16" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1.7" /><path d="M8 9V7a4 4 0 1 1 8 0v2" fill="none" stroke="currentColor" stroke-width="1.7" /></svg>
              </span>
              <input id="reset-password" name="password" type="password" placeholder="Create a strong password" required />
              <button class="btn btn-icon pwd-toggle" type="button" data-toggle-password="reset-password" aria-label="Show password">◌</button>
            </div>
            <div class="strength-meter" data-strength-meter>
              <div class="strength-meter__bar" aria-hidden="true"></div>
              <span class="strength-meter__label">Password strength: <strong data-strength-text>Weak</strong></span>
            </div>
          </div>

          <div class="field-group">
            <label class="input-label" for="reset-confirm">Confirm password</label>
            <div class="input-shell">
              <span class="input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" aria-hidden="true"><rect x="4" y="9" width="16" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1.7" /><path d="M8 9V7a4 4 0 1 1 8 0v2" fill="none" stroke="currentColor" stroke-width="1.7" /></svg>
              </span>
              <input id="reset-confirm" name="confirm" type="password" placeholder="Repeat your password" required />
              <button class="btn btn-icon pwd-toggle" type="button" data-toggle-password="reset-confirm" aria-label="Show password">◌</button>
            </div>
          </div>

          <p class="form-message" aria-live="polite"></p>

          <button class="btn btn-primary auth-submit" type="submit">Update password</button>
        </form>

        <p class="auth-footer"><a class="inline-link" href="login.html">Back to login</a></p>
      </div>
    </section>
  </main>

  <script src="../js/auth.js" defer></script>
  <script src="../js/navbar.js" defer></script>
</body>
</html>
